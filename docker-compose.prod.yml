version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/bitcoin_classifier_prod
      - SECRET_KEY=${SECRET_KEY}
      - BLOCKCYPHER_API_TOKEN=${BLOCKCYPHER_API_TOKEN}
      - MODEL_PATH=ml-models/with_structural_features/og_bitcoin_classifier.joblib
      - SCALER_PATH=ml-models/with_structural_features/og_scaler.joblib
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml-models:/app/ml-models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=bitcoin_classifier_prod
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_prod_data:












