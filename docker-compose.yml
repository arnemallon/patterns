version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5001:5001"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://postgres:password@db:5432/bitcoin_classifier
      - SECRET_KEY=your-production-secret-key-here
      - BLOCKCYPHER_API_TOKEN=your-blockcypher-token-here
    depends_on:
      - db
    volumes:
      - ./ml-models:/app/ml-models:ro
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=bitcoin_classifier
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5001/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:

